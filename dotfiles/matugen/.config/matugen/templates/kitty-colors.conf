# --- Matugen Terminal Colors ---

# Grundfarben
foreground            {{ colors.on_surface.default.hex }}
background            {{ colors.surface.default.hex }}
selection_foreground  {{ colors.on_primary.default.hex }}
selection_background  {{ colors.primary.default.hex }}

# Cursor
cursor                {{ colors.primary.default.hex }}
cursor_text_color     {{ colors.on_primary.default.hex }}

# URL Farbe (passend zum Akzent)
url_color             {{ colors.primary.default.hex }}

# Border (Fensterränder in Kitty)
active_border_color   {{ colors.primary.default.hex }}
inactive_border_color {{ colors.outline.default.hex }}
bell_border_color     {{ colors.error.default.hex }}

# Tab bar - Passend zum Waybar Design
tab_bar_style               fade
tab_fade                    1
active_tab_foreground       {{ colors.on_primary.default.hex }}
active_tab_background       {{ colors.primary.default.hex }}
active_tab_font_style       bold
inactive_tab_foreground     {{ colors.on_surface_variant.default.hex }}
inactive_tab_background     {{ colors.surface_container_low.default.hex }}
inactive_tab_font_style     normal
tab_bar_background          {{ colors.surface.default.hex }}

# --- ANSI Colors (Für CLI Tools wie btop, lsd, etc.) ---

# Black (Dunkelster Untergrund)
color0  {{ colors.surface_container_lowest.default.hex }}
color8  {{ colors.surface_bright.default.hex }}

# Red (Fehler/Warnungen)
color1  {{ colors.error.default.hex }}
color9  {{ colors.error_container.default.hex }}

# Green (Erfolg/Strings)
color2  {{ colors.tertiary.default.hex }}
color10 {{ colors.tertiary_fixed_dim.default.hex }}

# Yellow (Warnungen/Typen)
color3  {{ colors.secondary.default.hex }}
color11 {{ colors.secondary_fixed_dim.default.hex }}

# Blue (Akzent/Keywords)
color4  {{ colors.primary.default.hex }}
color12 {{ colors.primary_fixed_dim.default.hex }}

# Magenta
color5  {{ colors.primary_container.default.hex }}
color13 {{ colors.on_primary_container.default.hex }}

# Cyan
color6  {{ colors.secondary_container.default.hex }}
color14 {{ colors.on_secondary_container.default.hex }}

# White (Textfarben)
color7  {{ colors.on_surface_variant.default.hex }}
color15 {{ colors.on_surface.default.hex }}
