[config]
reload_apps = true
set_wallpaper = false  # We'll handle this with hyprpaper directly

[config.reload_apps_list]
waybar = true
hyprland = true
kitty = true
mako = true
hyprpaper = true

[templates.hyprland]
input_path = "~/.config/hypr/colors.conf"
output_path = "~/.config/hypr/colors.conf"

[templates.waybar]
input_path = "~/.config/waybar/colors.css"
output_path = "~/.config/waybar/colors.css"

[templates.kitty]
input_path = "~/.config/kitty/colors.conf"
output_path = "~/.config/kitty/colors.conf"

[templates.mako]
input_path = "~/.config/mako/config"
output_path = "~/.config/mako/config"

[templates.hyprpaper]
input_path = "~/.config/hypr/hyprpaper.conf"
output_path = "~/.config/hypr/hyprpaper.conf"
