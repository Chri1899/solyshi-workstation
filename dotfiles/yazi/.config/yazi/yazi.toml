[mgr]
ratio = [1, 2, 4]          # Verhältnis der drei Spalten (parent, current, preview)
sort_by = "natural"        # Natürliche Sortierung (1, 2, 10 statt 1, 10, 2)
sort_sensitive = false     # Case-insensitive Sortierung
sort_reverse = false
sort_dir_first = true      # Ordner immer oben
show_hidden = true        # Hidden files standardmäßig aus (toggle mit .)
show_symlink = true        # Symlink-Ziel anzeigen

[preview]
max_width = 1000
max_height = 1000
wrap = "no"
tab_size = 2

[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Neovim" },
]
video = [
    { run = 'mpv "$@"', orphan = true, desc = "mpv" },
]
pdf = [
    { run = 'zathura "$@"', orphan = true, desc = "Zathura" },
]
image = [
    { run = 'zathura "$@"', orphan = true, desc = "Zathura" },
]

[open]
rules = [
    # Text
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    { mime = "*/javascript", use = "edit" },

    # Video
    { mime = "video/*", use = "video" },

    # PDF
    { mime = "application/pdf", use = "pdf" },

    # Images
    { mime = "image/*", use = "image" },
]
