"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[mgr]
cwd = { fg = "#b1d18a" }

hovered         = { fg = "#e2e3d8", bg = "#282b24", bold = true }
preview_hovered = { underline = true }

find_keyword  = { fg = "#a0d0cc", bold = true }
find_position = { fg = "#bfcbad", italic = true }

marker_copied  = { fg = "#a0d0cc", bg = "#a0d0cc" }
marker_cut     = { fg = "#ffb4ab",    bg = "#ffb4ab" }
marker_marked  = { fg = "#bfcbad", bg = "#bfcbad" }
marker_selected = { fg = "#b1d18a", bg = "#b1d18a" }

tab_active   = { fg = "#1f3701", bg = "#b1d18a" }
tab_inactive = { fg = "#c5c8ba", bg = "#1e201a" }

[status]
overall = { fg = "#e2e3d8", bg = "#1a1c16" }

mode_normal = { fg = "#1f3701", bg = "#b1d18a", bold = true }
mode_select = { fg = "#003735", bg = "#a0d0cc", bold = true }
mode_unset  = { fg = "#690005", bg = "#ffb4ab", bold = true }

progress_label  = { fg = "#e2e3d8", bold = true }
progress_normal = { fg = "#b1d18a", bg = "#1a1c16" }
progress_error  = { fg = "#ffb4ab", bg = "#1a1c16" }

[filetype]
rules = [
    { mime = "image/*",       fg = "#a0d0cc" },
    { mime = "video/*",       fg = "#a0d0cc" },
    { mime = "audio/*",       fg = "#a0d0cc" },
    { mime = "application/pdf", fg = "#ffb4ab" },
    { mime = "application/zip", fg = "#bfcbad" },
    { mime = "application/x-tar", fg = "#bfcbad" },
    { mime = "text/*",        fg = "#e2e3d8" },
    { name = "*.toml",        fg = "#b1d18a" },
    { name = "*.yaml",        fg = "#b1d18a" },
    { name = "*.json",        fg = "#b1d18a" },
    { name = "*.lua",         fg = "#bfcbad" },
    { name = "*.sh",          fg = "#bfcbad" },
]
